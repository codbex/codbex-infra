name: Application - Release

on:
  workflow_call:
    inputs:
      application-name:
        required: true
        type: string
      install-dependencies:
        type: boolean
        default: false
      release-version:
        type: string
        required: true
      release-content:
        type: string
      release-create-branch:
        type: boolean
        default: true
      dockerfile-location:
        type: string
        default:  ./
      before-build-command:
        type: string

run-name: 'version set to ${{ inputs.release-version }} for release'

jobs:
  release:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: amd64
          - runner: ubuntu-24.04-arm
            platform: arm64

    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GH_TOKEN }}
        fetch-depth: 0

    - name: Set up JDK Corretto 21
      uses: actions/setup-java@v4
      with:
        distribution: 'corretto'
        java-version: '21'

    - name: Install NodeJS
      if: ${{ inputs.install-dependencies }}
      uses: actions/setup-node@v4
      with:
        node-version: 22.x

    - name: Install Dependencies
      if: ${{ inputs.install-dependencies }}
      run: |
        cd ${{ inputs.dockerfile-location }}
        echo "@codbex:registry=https://npm.pkg.github.com
        //npm.pkg.github.com/:_authToken=${{ secrets.GH_TOKEN }}" > .npmrc
        npm install
        rm -rf .npmrc

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Run Before Build Command
      if: ${{ inputs.before-build-command }}
      run: ${{ inputs.before-build-command }}

    - name: Build and push by digest
      id: build
      uses: docker/build-push-action@v6
      with:
        context: application
        platforms: ${{ matrix.platform }}
        tags: ghcr.io/codbex/${{ inputs.application-name }}
        outputs: type=image,push-by-digest=true,name-canonical=true,push=true

    - name: Export digest
      run: |
        mkdir -p /tmp/digests/${{ inputs.application-name }}
        digest="${{ steps.build.outputs.digest }}"
        touch "/tmp/digests/${{ inputs.application-name }}/${digest#sha256:}"

    - name: Upload digest
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.application-name }}-digests-${{ matrix.platform }}
        path: /tmp/digests/${{ inputs.application-name }}/*
        if-no-files-found: error
        retention-days: 1

  release-docker-manifest:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/${{ inputs.application-name }}
          pattern: ${{ inputs.application-name }}-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create manifest list and push
        working-directory: /tmp/digests/${{ inputs.application-name }}
        run: |
          docker buildx imagetools create -t ghcr.io/codbex/${{ inputs.application-name }}:${{ inputs.release-version }} \
            $(printf 'ghcr.io/codbex/${{ inputs.application-name }}@sha256:%s ' *)          

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/codbex/${{ inputs.application-name }}:${{ inputs.release-version }}

  release-artifacts:
    runs-on: ubuntu-latest
    needs: release-docker-manifest

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: "Configure Git"
        run: |
          git fetch
          git checkout ${{ inputs.branch }}
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Git Push Release Branch
        if: ${{ inputs.release-create-branch }}
        run: |
          git checkout -b ${{ inputs.release-version }}
          git push --set-upstream origin ${{ inputs.release-version }}

      - name: "Create Release"
        if: ${{ inputs.release-content }}
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ inputs.release-version }}
          name: ${{ inputs.release-version }}
          draft: false
          prerelease: false
          files: |
            LICENSE
          body: ${{ inputs.release-content }}
